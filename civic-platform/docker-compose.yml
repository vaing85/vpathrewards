version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: civic-platform-db
    environment:
      POSTGRES_USER: civic
      POSTGRES_PASSWORD: civic123
      POSTGRES_DB: civic_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civic"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: civic-platform-api
    environment:
      DATABASE_URL: postgresql://civic:civic123@postgres:5432/civic_platform
      JWT_SECRET: your-jwt-secret-change-in-production
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/main.js"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: civic-platform-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:

